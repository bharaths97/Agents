[pytest]
# Pytest configuration for CODE_MAPPER

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    unit: unit tests
    integration: integration tests
    e2e: end-to-end tests
    slow: slow tests (deselect with '-m "not slow"')
    semgrep: tests that require Semgrep

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --asyncio-mode=auto

# Test paths
testpaths = tests

# Coverage options
[coverage:run]
source = .
omit =
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
