version: "3.8"

services:
  taint-analyst:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ${REPO_PATH:-.}:/repo:ro               # Mount target repo (read-only)
      - ${OUTPUT_DIR:-./output}:/app/output     # Analysis output
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_ORGANIZATION=${OPENAI_ORGANIZATION:-}
      - OPENAI_PROJECT=${OPENAI_PROJECT:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5-nano}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_TOKENS_PER_CHUNK=${MAX_TOKENS_PER_CHUNK:-8000}
      - CONCURRENT_FILE_WORKERS=${CONCURRENT_FILE_WORKERS:-3}
      - RAG_DOCS_PATH=${RAG_DOCS_PATH:-rag/docs}
      - REPO_URL=${REPO_URL:-}
      - DEBUG_DUMP=${DEBUG_DUMP}
      - REPO_BRANCH=${REPO_BRANCH:-}
      - REPO_COMMIT=${REPO_COMMIT:-}
      - REFRESH_CLONE=${REFRESH_CLONE:-false}
      - SEMGREP_ENABLED=${SEMGREP_ENABLED:-true}
      - SEMGREP_BINARY=${SEMGREP_BINARY:-semgrep}
      - SEMGREP_APP_TOKEN=${SEMGREP_APP_TOKEN:-}
      - SEMGREP_RULES_ROOT=${SEMGREP_RULES_ROOT:-/semgrep-rules}
      - SEMGREP_MAX_RULES=${SEMGREP_MAX_RULES:-800}
      - SEMGREP_TIMEOUT_SEC=${SEMGREP_TIMEOUT_SEC:-180}
      - SEMGREP_MAX_FINDINGS_PER_FILE=${SEMGREP_MAX_FINDINGS_PER_FILE:-50}
      - SEMGREP_INDEX_CACHE_FILE=${SEMGREP_INDEX_CACHE_FILE:-output/semgrep_rules_index.json}
      - PHASE3_CROSS_FILE_ENABLED=${PHASE3_CROSS_FILE_ENABLED:-false}
      - PHASE3_CALL_GRAPH_MAX_HOPS=${PHASE3_CALL_GRAPH_MAX_HOPS:-5}
      - PHASE3_CALL_GRAPH_MAX_CHAINS_PER_FILE=${PHASE3_CALL_GRAPH_MAX_CHAINS_PER_FILE:-20}
    env_file:
      - .env
    entrypoint:
      - "sh"
      - "-c"
    command:
      - |
        set -e
        echo "[DEBUG] DEBUG_DUMP=$$DEBUG_DUMP" >&2
        DUMP_ARG=""
        DEBUG_DUMP_LOWER=$$(printf "%s" "$$DEBUG_DUMP" | tr '[:upper:]' '[:lower:]')
        echo "[DEBUG] DEBUG_DUMP_LOWER=$$DEBUG_DUMP_LOWER" >&2
        case "$$DEBUG_DUMP_LOWER" in
          1|true|yes|on)
            DUMP_ARG="--debug-dump"
            ;;
        esac
        echo "[DEBUG] DUMP_ARG=$$DUMP_ARG" >&2
        if [ -n "$$REPO_URL" ]; then
          BRANCH_ARG=""
          if [ -n "$$REPO_BRANCH" ]; then
            BRANCH_ARG="--repo-branch $$REPO_BRANCH"
          fi
          echo "[DEBUG] Executing: python main.py --repo-url \"$$REPO_URL\" $$BRANCH_ARG --output-dir /app/output --model \"$$OPENAI_MODEL\" $$DUMP_ARG" >&2
          exec python main.py --repo-url "$$REPO_URL" $$BRANCH_ARG --output-dir /app/output --model "$$OPENAI_MODEL" $$DUMP_ARG
        else
          echo "[DEBUG] Executing: python main.py --repo-path /repo --output-dir /app/output --model \"$$OPENAI_MODEL\" $$DUMP_ARG" >&2
          exec python main.py --repo-path /repo --output-dir /app/output --model "$$OPENAI_MODEL" $$DUMP_ARG
        fi

    restart: "no"
